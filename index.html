<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Hub Pro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="header">
  <h1>Learning Hub</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#courses">Courses</a>
    <a href="#register">Register</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="home" class="hero">
  <div class="hero-text">
    <h2>Master New Skills</h2>
    <p>Interactive learning with real-world projects</p>
    <button onclick="scrollToCourses()">Explore Courses</button>
  </div>
</section>

<section id="courses">
  <h2 class="section-title">Our Courses</h2>

  <input type="text" id="search" placeholder="Search course..." onkeyup="filterCourses()" />

  <div class="course-container" id="courseList"></div>
</section>

<section id="register">
  <h2 class="section-title">Register</h2>
  <form onsubmit="return validateForm()" class="form">
    <input type="text" id="name" placeholder="Name" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <input type="password" id="confirm" placeholder="Confirm Password" required />
    <button type="submit">Submit</button>
  </form>
</section>

<section id="contact">
  <h2 class="section-title">Contact</h2>
  <p>Email: example@gmail.com</p>
  <p>Phone: 9876543210</p>
</section>

<script src="script.js"></script>
</body>
</html>
